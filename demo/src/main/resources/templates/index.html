<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shift Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="mb-4">Employee Database</h2>
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3">
                <h4>Add Employee</h4>
                <form th:action="@{/add}" th:object="${employee}" method="post">
                    <input type="text" th:field="*{name}" class="form-control mb-2" placeholder="Name" required>
                    <select th:field="*{role}" class="form-select mb-2">
                        <option value="NORMAL">Normal Staff</option>
                        <option value="MANAGER">Manager</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <table class="table table-hover bg-white shadow-sm rounded">
                <tr th:each="emp : ${employees}">
                    <td th:text="${emp.name}"></td>
                    <td th:text="${emp.role}"></td>
                    <td>
                        <a th:href="@{/edit/{id}(id=${emp.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/delete/{id}(id=${emp.id})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>
</body>
</html>
