<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
<h2>Team Shift Scheduler</h2>
<div class="row">
    <div class="col-md-4">
        <form th:action="@{/add-employee}" method="post" class="card p-3">
            <input type="text" name="name" placeholder="Name" class="form-control mb-2" required>
            <select name="role" class="form-select mb-2">
                <option value="NORMAL">Normal</option>
                <option value="MANAGER">Manager</option>
            </select>
            <input type="number" name="maxHours" value="40" class="form-control mb-2">
            <label>Availability:</label>
            <div th:each="shift : ${definedShifts}">
                <input type="checkbox" name="availability" th:value="${shift}"> [[${shift}]]
            </div>
            <button type="submit" class="btn btn-primary mt-2">Add Employee</button>
        </form>
    </div>
    <div class="col-md-8">
        <form th:action="@{/generate}" method="post">
            <input type="number" name="staffNeeded" value="1" class="form-control w-25 d-inline">
            <button type="submit" class="btn btn-success">Generate Schedule</button>
        </form>
        <div class="mt-4" th:if="${schedule}">
            <h4>Schedule:</h4>
            <div th:each="entry : ${schedule}">
                <strong th:text="${entry.key}"></strong>: [[${entry.value}]]
            </div>
        </div>
    </div>
</div>
</body>
</html>
