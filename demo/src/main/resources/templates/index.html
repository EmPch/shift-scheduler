<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
<h2>Team Dashboard</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card p-3">
            <h4>Employees</h4>
            <table class="table">
                <tr th:each="emp : ${employees}">
                    <td th:text="${emp.name}"></td>
                    <td>
                        <a th:href="@{/delete/{id}(id=${emp.id})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    <div class="col-md-6">
        <form th:action="@{/generate}" method="post">
            <button type="submit" class="btn btn-success btn-lg">Generate Weekly Schedule</button>
        </form>

        <div th:if="${schedule}" class="mt-4">
            <h4>Generated Schedule</h4>
            <div th:each="entry : ${schedule}">
                <strong th:text="${entry.key}"></strong>:
                <span th:text="${#strings.listJoin(entry.value, ', ')}"></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
