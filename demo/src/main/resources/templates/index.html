<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shift Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="text-center text-primary mb-4">Shift Scheduling System</h1>

<div class="row">
    <div class="col-md-5">

        <div class="card p-4 shadow-sm mb-4">
            <h3 class="text-primary mb-3">Add Employee</h3>
            <form th:action="@{/add-employee}" method="post">
                <div class="mb-3">
                    <label class="form-label">Employee Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. John Doe" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select">
                        <option value="NORMAL">Normal Person</option>
                        <option value="MANAGER">Manager</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Max Hours Per Week</label>
                    <input type="number" name="maxHours" class="form-control" value="40" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold border-bottom pb-2 w-100">Availability</label>
                    <div class="row">
                        <div th:each="shift : ${definedShifts}" class="col-6 mb-2">
                            <div class="form-check bg-light p-2 rounded border">
                                <input class="form-check-input ms-1" type="checkbox" name="availability" th:value="${shift}" th:id="${shift}">
                                <label class="form-check-label ms-2" th:for="${shift}" th:text="${shift}"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold">Add Staff Member</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm">
            <h3 class="text-success mb-3">Schedule Settings</h3>
            <form th:action="@{/generate}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">Staff Needed Per Shift</label>
                    <input type="number" name="staffNeeded" class="form-control" value="2" min="1" max="10" required>
                    <small class="text-muted">How many normal workers do you need per shift?</small>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Generate Schedule</button>
            </form>
        </div>

    <div class="col-md-7">
        <div class="card p-4 shadow-sm h-100">
            <h3 class="mb-3">Current Team Roster</h3>
            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Max Hours</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emp : ${employees}">
                        <td th:text="${emp.name}" class="fw-bold"></td>
                        <td>
                                    <span th:text="${emp.role}"
                                          th:classappend="${emp.role == 'MANAGER'} ? 'badge bg-danger' : 'badge bg-secondary'">
                                    </span>
                        </td>
                        <td th:text="${emp.maxHours} + ' hrs'"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="3" class="text-muted text-center py-4">No employees added yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="row mt-5 mb-5" th:if="${not #lists.isEmpty(schedule)}">
    <div class="col-12">
        <div class="card p-4 shadow border-success">
            <h3 class="text-success mb-3">Finalized Weekly Schedule</h3>
            <div class="table-responsive">
                <table class="table table-bordered align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>Shift Time</th>
                        <th>Manager on Duty</th>
                        <th>Staff Members</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="assignment : ${schedule}">
                        <td class="fw-bold" th:text="${assignment.shiftName}"></td>

                        <td class="bg-light text-danger fw-bold">
                            <span th:if="${assignment.manager != null}" th:text="${assignment.manager.name}"></span>
                            <span th:if="${assignment.manager == null}" class="badge bg-warning text-dark">NO MANAGER AVAILABLE</span>
                        </td>

                        <td>
                                    <span th:each="staff : ${assignment.normalStaff}"
                                          th:text="${staff.name} + ' (' + ${staff.assignedHours} + ' total hrs)'"
                                          class="badge bg-secondary me-1 mb-1">
                                    </span>
                            <span th:if="${#lists.isEmpty(assignment.normalStaff)}" class="text-muted fst-italic">Short Staffed</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
