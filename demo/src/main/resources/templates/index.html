<!-- Master Roster -->
<div class="card shadow-sm p-4 mb-4">
    <h4 class="mb-3">Master Roster</h4>
    <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr><th>Name</th><th>Role</th><th>This week</th><th>Action</th></tr>
        </thead>
        <tbody>
        <tr th:each="emp, s : ${roster}">
            <td th:text="${emp.name}" class="fw-bold"></td>
            <td><span th:classappend="${emp.role == 'MANAGER'} ? 'badge bg-danger' : 'badge bg-secondary'"
                      th:text="${emp.role}"></span></td>
            <td>
                <span th:if="${!notInPool.contains(emp)}" class="badge bg-success">In schedule</span>
                <span th:if="${notInPool.contains(emp)}" class="text-muted small">Not added</span>
            </td>
            <td>
                <a th:href="@{/add-to-schedule/{i}(i=${s.index})}"
                   class="btn btn-sm btn-primary me-1">
                    <span th:text="${notInPool.contains(emp)} ? 'Add to schedule' : 'Edit availability'"></span>
                </a>
                <a th:href="@{/delete-employee/{i}(i=${s.index})}"
                   class="btn btn-sm btn-outline-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- This week's schedule pool -->
<div class="card shadow-sm p-4 mb-4" th:if="${not #lists.isEmpty(schedulePool)}">
    <h4 class="mb-3">This week's pool</h4>
    <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr><th>Name</th><th>Role</th><th>Max hrs</th><th>Shifts available</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="entry, s : ${schedulePool}">
            <td th:text="${entry.name}" class="fw-bold"></td>
            <td><span th:classappend="${entry.role == 'MANAGER'} ? 'badge bg-danger' : 'badge bg-secondary'"
                      th:text="${entry.role}"></span></td>
            <td th:text="${entry.maxHours}"></td>
            <td><span th:text="${#lists.size(entry.availability)}"></span> shifts</td>
            <td>
                <a th:href="@{/remove-from-schedule/{i}(i=${s.index})}"
                   class="btn btn-sm btn-outline-danger">Remove</a>
            </td>
        </tr>
        </tbody>
    </table>

    <form th:action="@{/generate}" method="post" class="row align-items-end g-3 mt-1">
        <div class="col-md-8">
            <label class="form-label fw-bold">Staff needed per shift</label>
            <input type="number" name="staffNeeded" class="form-control" value="2" min="1" max="10">
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-success w-100">Generate schedule</button>
        </div>
    </form>
</div>
