<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div class="container">
    <div class="card mb-4 p-4 shadow-sm">
        <h4 class="mb-3">Employee Data Bank</h4>
        <form th:action="@{/add}" th:object="${employee}" method="post" class="row g-2">
            <div class="col-md-3">
                <input type="text" th:field="*{name}" class="form-control" placeholder="Name" required>
            </div>
            <div class="col-md-3">
                <select th:field="*{role}" class="form-select">
                    <option value="NORMAL">Normal Staff</option>
                    <option value="MANAGER">Manager</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" th:field="*{maxHours}" class="form-control" placeholder="Hrs">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Add</button>
            </div>
        </form>

        <table class="table mt-3">
            <thead><tr><th>Name</th><th>Role</th><th>Max Hrs</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.name}"></td>
                <td th:text="${emp.role}"></td>
                <td th:text="${emp.maxHours}"></td>
                <td>
                    <a class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/delete/{id}(id=${emp.id})}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
