<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card p-4 shadow-sm" style="max-width: 500px; margin: auto;">
    <h3>Edit Employee</h3>
    <form th:action="@{/edit-employee/{index}(index=${index})}" method="post">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" th:value="${employee.name}" required>
        </div>
        <div class="mb-3">
            <label>Role</label>
            <select name="role" class="form-select">
                <option value="NORMAL" th:selected="${employee.role == 'NORMAL'}">Normal Staff</option>
                <option value="MANAGER" th:selected="${employee.role == 'MANAGER'}">Manager</option>
            </select>
        </div>
        <div class="mb-3">
            <label>Max Hours</label>
            <input type="number" name="maxHours" class="form-control" th:value="${employee.maxHours}" required>
        </div>
        <label class="fw-bold">Availability</label>
        <div class="mb-3 border p-2">
            <div th:each="shift : ${definedShifts}">
                <input type="checkbox" name="availability" th:value="${shift}"
                       th:checked="${employee.availability.contains(shift)}">
                <span th:text="${shift}"></span>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
    </form>
</div>
</body>
</html>
