<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add to Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body class="container mt-5">

<div class="card p-4 shadow-sm" style="max-width: 500px; margin: auto;">
    <h3 class="mb-1">Set this week's availability</h3>
    <p class="text-muted mb-4">
        <strong th:text="${employee.name}"></strong>
        &nbsp;·&nbsp;
        <span th:text="${employee.role}"></span>
    </p>

    <form th:action="@{/add-to-schedule/{i}(i=${employeeId})}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Max hours this week</label>
            <input type="number" name="maxHours" class="form-control" value="40" required>
        </div>

        <label class="form-label fw-bold">Available shifts</label>
        <div class="row g-2 mb-4">
            <div th:each="shift : ${definedShifts}" class="col-6">
                <div class="form-check border rounded p-3">
                    <input class="form-check-input" type="checkbox" name="availability"
                           th:value="${shift}" th:id="${shift}">
                    <label class="form-check-label" th:for="${shift}" th:text="${shift}"></label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Save & add to schedule</button>
        <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div>

</body>
</html>
